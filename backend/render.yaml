services:
  - type: web
    name: attendance-checker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SYNC_API_KEY
        generateValue: true
    disk:
      name: checker-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
